<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заполнение договора — Mebel Grand</title>
<meta name="description" content="Быстрое заполнение договора Mebel Grand СПБ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js">
// ── СПЕЦИФИКАЦИЯ ────────────────────────────────
document.getElementById('spec_details').addEventListener('toggle', function(){
  document.getElementById('spec_arrow').textContent = this.open ? '▼' : '▶';
});

// Слоты картинок
const imgData = Array(10).fill(null);
const slotsEl = document.getElementById('img_slots');
for(let i=0;i<10;i++){
  const slot = document.createElement('div');
  slot.style.cssText='aspect-ratio:1;border:1px dashed var(--border2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface2);position:relative;overflow:hidden;font-size:11px;color:var(--text3);gap:4px';
  slot.innerHTML='<span style="font-size:18px">📷</span><span>'+(i+1)+'</span>';
  slot.onclick=()=>document.getElementById('img_inp_'+i).click();
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.id='img_inp_'+i;inp.style.display='none';
  inp.onchange=function(e){
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=function(ev){
      imgData[i]={data:ev.target.result,mime:f.type,name:f.name};
      slot.innerHTML='';
      const img=document.createElement('img');
      img.src=ev.target.result;
      img.style.cssText='width:100%;height:100%;object-fit:cover';
      const rm=document.createElement('div');
      rm.innerHTML='✕';
      rm.style.cssText='position:absolute;top:2px;right:4px;font-size:11px;cursor:pointer;color:var(--red-text);font-weight:700';
      rm.onclick=function(ev){ev.stopPropagation();imgData[i]=null;slot.innerHTML='<span style="font-size:18px">📷</span><span>'+(i+1)+'</span>';};
      slot.appendChild(img);slot.appendChild(rm);
    };
    r.readAsDataURL(f);
  };
  slot.appendChild(inp);
  slotsEl.appendChild(slot);
}

function calcSpec(){
  const amt=parseFloat(document.getElementById('spec_amount').value)||0;
  const pct=parseFloat(document.getElementById('spec_assembly_pct').value)||0;
  const total=amt;
  const asmSum=Math.round(total*pct/100*100)/100;
  document.getElementById('spec_total').value=total?total.toLocaleString('ru-RU')+' руб.':'';
  document.getElementById('spec_assembly_sum').value=asmSum?asmSum.toLocaleString('ru-RU')+' руб.':'';
}

async function generateSpec(sharedData){
  const binary=atob(SPEC_B64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  const zip=new PizZip(bytes.buffer);
  const doc2=new window.docxtemplater(zip,{delimiters:{start:'{{',end:'}}'},paragraphLoop:true,nullGetter:function(){return '--';}});
  const amt=parseFloat(document.getElementById('spec_amount').value)||0;
  const pct=parseFloat(document.getElementById('spec_assembly_pct').value)||0;
  doc2.render({
    ...sharedData,
    'единица товара': document.getElementById('spec_unit').value||'шт',
    'Сумма спец': amt?amt.toLocaleString('ru-RU')+' руб.':'—',
    'Процент сборки': pct?pct+'%':'—',
    'Общая сумма спец': document.getElementById('spec_total').value||'—',
    'Процент от общей суммы спец': document.getElementById('spec_assembly_sum').value||'—',
  });
  const out=doc2.getZip().generate({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(out);
  a.download='Спецификация_'+( sharedData['ФИО_клиента'].split(' ')[0]||'клиент')+'.docx';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
}

</script>

<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#1a1a18;--text2:#6b6b67;--text3:#a8a8a4;
  --blue:#2355f5;--blue-bg:#eef1fe;--blue-text:#1a3db8;
  --green:#1a9e6e;--green-bg:#e4f5ef;--green-text:#0f6847;
  --amber:#d97706;--amber-bg:#fef3e2;--amber-text:#92520a;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#991b1b;
  --r:10px;--rl:14px;--font:'Golos Text',sans-serif;--mono:'JetBrains Mono',monospace;
}
[data-theme=dark]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#242422;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0efe9;--text2:#8f8f8a;--text3:#5a5a56;
  --blue:#4f78ff;--blue-bg:#1a2040;--blue-text:#93aaff;
  --green-bg:#0f2a1f;--green-text:#4fd4a0;
  --amber-bg:#2a1f0a;--amber-text:#fbbf65;
  --red-bg:#2a1010;--red-text:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
/* TOPBAR */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:9px}
.lm{width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lm svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
.lt{font-size:15px;font-weight:600;letter-spacing:-.02em}.lt span{color:var(--blue)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.ibtn{width:30px;height:30px;border:1px solid var(--border2);border-radius:7px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;flex-shrink:0;font-family:var(--font)}
.ibtn:hover{background:var(--border);color:var(--text)}
/* CONTENT */
.content{padding:24px 16px 48px;min-height:calc(100vh - 52px)}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;max-width:560px;margin:0 auto}
.card-title{font-size:15px;font-weight:600;letter-spacing:-.02em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
/* SECTION */
.sec{margin-bottom:14px}
.sec-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
/* FORM */
.fg{margin-bottom:10px}
.fl{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .12s}
.fi:focus{border-color:var(--blue)}
.fi[readonly]{opacity:.65;cursor:not-allowed;border-style:dashed}
.fi-auto{background:var(--blue-bg);color:var(--blue-text);border-color:rgba(35,85,245,.2)}
[data-theme=dark] .fi-auto{color:var(--blue-text)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* TEMPLATE BLOCK */
.tpl-block{background:var(--surface2);border:1px dashed var(--border2);border-radius:8px;padding:12px;margin-bottom:14px}
.tpl-info{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.tpl-name{font-size:12px;font-weight:500;color:var(--blue-text);margin-top:5px;display:none;word-break:break-all}
.tpl-btns{display:flex;gap:8px;flex-wrap:wrap}
/* BUTTONS */
.btn{padding:7px 14px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:#1a44dd;border-color:#1a44dd}
.btn-d{color:var(--red-text);border-color:currentColor}.btn-d:hover{background:var(--red-bg)}
.btn-s{padding:5px 11px;font-size:12px;border-radius:7px}
.btn-gen{width:100%;padding:11px;font-size:14px;font-weight:600;justify-content:center;border-radius:var(--r);margin-top:16px}
/* TOAST */
.tco{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.to{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:500;animation:tin .2s ease;max-width:300px}
.to.s{border-left:3px solid var(--green)}.to.e{border-left:3px solid var(--red)}.to.i{border-left:3px solid var(--blue)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* BADGE */
.auto-badge{font-size:9px;background:var(--blue-bg);color:var(--blue-text);border-radius:20px;padding:1px 6px;font-weight:600;letter-spacing:.03em;margin-left:4px;vertical-align:middle}
::-webkit-scrollbar{width:5px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:6px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <div class="lm"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><path d="M9 12h6M12 9v6"/></svg></div>
    <div class="lt">Мебель<span>Гранд</span></div>
  </div>
  <div class="topbar-right">
    <span style="font-size:12px;color:var(--text3)">Заполнение договора</span>
    <button class="ibtn" onclick="toggleTheme()" title="Тема">◑</button>
  </div>
</div>

<div class="content">
  <div class="card">
    <div class="card-title">📋 Заполнение договора</div>

    <!-- СЕКЦИЯ: ДОГОВОР -->
    <div class="sec">
      <div class="sec-label">Договор</div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="contract_number">Номер договора</label>
          <input class="fi" id="contract_number" type="text" placeholder="2025-001">
        </div>
        <div class="fg">
          <label class="fl" for="contract_date">Дата <span class="auto-badge">авто</span></label>
          <input class="fi fi-auto" id="contract_date" type="text" readonly>
        </div>
      </div>
    </div>

    <!-- СЕКЦИЯ: КЛИЕНТ -->
    <div class="sec">
      <div class="sec-label">Клиент</div>
      <div class="fg">
        <label class="fl" for="client_name">ФИО клиента</label>
        <input class="fi" id="client_name" type="text" placeholder="Иванов Иван Петрович">
      </div>
      <div class="fg">
        <label class="fl" for="passport">Паспорт</label>
        <input class="fi" id="passport" type="text" placeholder="4510 123456, выдан УФМС...">
      </div>
      <div class="fg">
        <label class="fl" for="registration">Адрес регистрации</label>
        <input class="fi" id="registration" type="text" placeholder="г. Санкт-Петербург, ул. Примерная, д. 1">
      </div>
      <div class="fg">
        <label class="fl" for="delivery">Адрес доставки</label>
        <input class="fi" id="delivery" type="text" placeholder="г. Санкт-Петербург, ул. Доставки, д. 2">
      </div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="phone">Телефон</label>
          <input class="fi" id="phone" type="tel" placeholder="+7 900 000-00-00">
        </div>
        <div class="fg">
          <label class="fl" for="email">Email</label>
          <input class="fi" id="email" type="email" placeholder="client@mail.ru">
        </div>
      </div>
    </div>

    <!-- СЕКЦИЯ: ФИНАНСЫ -->
    <div class="sec">
      <div class="sec-label">Финансы</div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="amount">Сумма (₽)</label>
          <input class="fi" id="amount" type="number" placeholder="150000" min="0">
        </div>
        <div class="fg">
          <label class="fl" for="amount_words">Сумма прописью <span class="auto-badge">авто</span></label>
          <input class="fi fi-auto" id="amount_words" type="text" readonly>
        </div>
      </div>
      <div class="grid2">
        <div class="fg">
          <label class="fl" for="prepayment">Предоплата (₽)</label>
          <input class="fi" id="prepayment" type="number" placeholder="50000" min="0">
        </div>
        <div class="fg">
          <label class="fl" for="prepayment_words">Предоплата прописью <span class="auto-badge">авто</span></label>
          <input class="fi fi-auto" id="prepayment_words" type="text" readonly>
        </div>
      </div>
    </div>

    <!-- СЕКЦИЯ: ПОДПИСЬ -->
    <div class="sec">
      <div class="sec-label">Подпись</div>
      <div class="fg">
        <label class="fl" for="initials">Инициалы клиента <span class="auto-badge">авто</span></label>
        <input class="fi fi-auto" id="initials" type="text" readonly placeholder="Заполните ФИО выше">
      </div>
    </div>

    <!-- СЕКЦИЯ: ШАБЛОН -->
    <div class="sec">
      <div class="sec-label">Шаблон договора</div>
      <div class="tpl-block">
        <div class="tpl-info">📄 <span id="tpl_label">Встроенный договор Mebel Grand СПБ</span></div>
        <div class="tpl-name" id="tpl_name"></div>
        <div class="tpl-btns">
          <button class="btn btn-s" onclick="document.getElementById('tpl_file').click()">
            📎 Загрузить свой .docx
          </button>
          <button class="btn btn-s btn-d" id="tpl_reset_btn" style="display:none" onclick="resetTemplate()">
            ✕ Сбросить
          </button>
        </div>
        <input type="file" id="tpl_file" accept=".docx" style="display:none">
      </div>
    </div>


    <!-- СЕКЦИЯ: СПЕЦИФИКАЦИЯ -->
    <details id="spec_details" style="margin-bottom:14px">
      <summary style="cursor:pointer;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:8px 0;border-bottom:1px solid var(--border);list-style:none;display:flex;align-items:center;gap:6px">
        <span id="spec_arrow">▶</span> Спецификация <span class="auto-badge" style="margin-left:4px">необязательно</span>
      </summary>
      <div style="margin-top:12px">
        <div class="sec">
          <div class="sec-label">Товар</div>
          <div class="grid2">
            <div class="fg"><label class="fl" for="spec_unit">Единица товара</label><input class="fi" id="spec_unit" type="text" placeholder="шт"></div>
            <div class="fg"><label class="fl" for="spec_amount">Сумма спец (₽)</label><input class="fi" id="spec_amount" type="number" placeholder="0" min="0" oninput="calcSpec()"></div>
          </div>
          <div class="grid2">
            <div class="fg"><label class="fl" for="spec_assembly_pct">Процент сборки (%)</label><input class="fi" id="spec_assembly_pct" type="number" placeholder="0" min="0" max="100" oninput="calcSpec()"></div>
            <div class="fg"><label class="fl" for="spec_total">Общая сумма <span class="auto-badge">авто</span></label><input class="fi fi-auto" id="spec_total" type="text" readonly></div>
          </div>
          <div class="fg"><label class="fl" for="spec_assembly_sum">% от общей суммы <span class="auto-badge">авто</span></label><input class="fi fi-auto" id="spec_assembly_sum" type="text" readonly></div>
        </div>
        <div class="sec">
          <div class="sec-label">Картинки (до 10)</div>
          <div id="img_slots" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px"></div>
        </div>
        <div class="sec">
          <div class="sec-label">Скачать спецификацию</div>
          <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:8px 0">
            <input type="checkbox" id="spec_download" checked style="width:16px;height:16px;accent-color:var(--blue)">
            Скачать спецификацию вместе с договором
          </label>
        </div>
      </div>
    </details>

    <button class="btn btn-p btn-gen" id="btn_gen" onclick="generateContract()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v9M4 7l4 4 4-4M2 14h12"/></svg>
      Сгенерировать и скачать договор
    </button>
  </div>
</div>

<div class="tco" id="tco"></div>

<script>
// ── ТЕМА ─────────────────────────────────────────────────────
function toggleTheme(){
  const t=document.body.getAttribute('data-theme')==='dark'?'light':'dark';
  document.body.setAttribute('data-theme',t);
  localStorage.setItem('cf_theme',t);
}
document.body.setAttribute('data-theme',localStorage.getItem('cf_theme')||'light');

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,t='s'){
  const el=document.createElement('div');
  el.className='to '+t;el.textContent=msg;
  document.getElementById('tco').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

// ── ЧИСЛО ПРОПИСЬЮ ────────────────────────────────────────────
function numberToWords(n){
  n=Math.floor(Math.abs(n));
  if(n===0)return'ноль';
  const ones=['','один','два','три','четыре','пять','шесть','семь','восемь','девять'];
  const onesF=['','одна','две','три','четыре','пять','шесть','семь','восемь','девять'];
  const teens=['десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать','шестнадцать','семнадцать','восемнадцать','девятнадцать'];
  const tens=['','','двадцать','тридцать','сорок','пятьдесят','шестьдесят','семьдесят','восемьдесят','девяносто'];
  const hundreds=['','сто','двести','триста','четыреста','пятьсот','шестьсот','семьсот','восемьсот','девятьсот'];

  function triplet(num,female){
    let r='',h=Math.floor(num/100),t=Math.floor((num%100)/10),o=num%10;
    if(h)r+=hundreds[h]+' ';
    if(t===1){r+=teens[o]+' ';}
    else{if(t)r+=tens[t]+' ';if(o)r+=(female?onesF:ones)[o]+' ';}
    return r;
  }
  function plural(n,f1,f2,f5){
    const m=n%100,o=n%10;
    if(m>=11&&m<=19)return f5;
    if(o===1)return f1;
    if(o>=2&&o<=4)return f2;
    return f5;
  }

  let result='';
  const ml=Math.floor(n/1000000),th=Math.floor((n%1000000)/1000),rem=n%1000;
  if(ml){result+=triplet(ml,false)+plural(ml,'миллион','миллиона','миллионов')+' ';}
  if(th){result+=triplet(th,true)+plural(th,'тысяча','тысячи','тысяч')+' ';}
  if(rem){result+=triplet(rem,false);}
  return result.trim();
}

// ── ДАТА ─────────────────────────────────────────────────────
function formatDate(){
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d=new Date();
  return'«'+String(d.getDate()).padStart(2,'0')+'» '+months[d.getMonth()]+' '+d.getFullYear()+' г.';
}

// ── ИНИЦИАЛЫ ─────────────────────────────────────────────────
function getInitials(fullName){
  const parts=fullName.trim().split(/\s+/).filter(Boolean);
  if(parts.length<1)return'';
  if(parts.length===1)return parts[0];
  const surname=parts[0];
  const inits=parts.slice(1).map(p=>p[0].toUpperCase()+'.').join('');
  return inits+' '+surname;
}

});

});

// ── ШАБЛОН ───────────────────────────────────────────────────
let customTemplate=null;
const fileInput=document.getElementById('tpl_file');

fileInput.addEventListener('change',function(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    customTemplate=ev.target.result;
    document.getElementById('tpl_label').textContent='Кастомный шаблон:';
    document.getElementById('tpl_name').textContent=file.name;
    document.getElementById('tpl_name').style.display='block';
    document.getElementById('tpl_reset_btn').style.display='inline-flex';
    toast('Шаблон загружен: '+file.name,'i');
  };
  reader.readAsArrayBuffer(file);
  this.value='';
});

function resetTemplate(){
  customTemplate=null;
  document.getElementById('tpl_label').textContent='Встроенный договор Mebel Grand СПБ';
  document.getElementById('tpl_name').style.display='none';
  document.getElementById('tpl_reset_btn').style.display='none';
  toast('Сброшен на встроенный шаблон','i');
}

// ── ГЕНЕРАЦИЯ ─────────────────────────────────────────────────
async function generateContract(){
  const btn=document.getElementById('btn_gen');
  btn.disabled=true;btn.textContent='⏳ Генерирую...';
  try{
    let zipData;
    if(customTemplate){
      zipData=new PizZip(customTemplate);
    }else{
      try{
        const resp=await fetch('./Договор mebel_grand СПБ.docx');
        if(!resp.ok)throw new Error();
        zipData=new PizZip(await resp.arrayBuffer());
      }catch{
        // Используем встроенный base64
        const binary=atob(DEFAULT_B64);
        const bytes=new Uint8Array(binary.length);
        for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
        zipData=new PizZip(bytes.buffer);
      }
    }

    const doc=new window.docxtemplater(zipData,{
      paragraphLoop:true,
      delimiters:{start:'{{',end:'}}'},
      nullGetter:function(){return '';}
    });

    const clientName=document.getElementById('client_name').value;
    const amountVal=document.getElementById('amount').value;
    const prepayVal=document.getElementById('prepayment').value;

    doc.render({
      'Номер_договора': document.getElementById('contract_number').value||'—',
      'Дата_договора': document.getElementById('contract_date').value,
      'ФИО_клиента': clientName||'—',
      'Сумма_цифрами': amountVal?Number(amountVal).toLocaleString('ru-RU')+' руб.':'—',
      'Сумма_прописью': document.getElementById('amount_words').value||'—',
      'Предоплата_цифрами': prepayVal?Number(prepayVal).toLocaleString('ru-RU')+' руб.':'—',
      'Предоплата_прописью': document.getElementById('prepayment_words').value||'—',
      'Паспорт': document.getElementById('passport').value||'—',
      'Адрес_регистрации': document.getElementById('registration').value||'—',
      'Адрес_доставки': document.getElementById('delivery').value||'—',
      'Телефон': document.getElementById('phone').value||'—',
      'Email': document.getElementById('email').value||'—',
      'Инициалы_Фамилия': document.getElementById('initials').value||'—'
    });

    const out=doc.getZip().generate({
      type:'blob',
      mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });

    const num=document.getElementById('contract_number').value||'';
    const fname='Договор_'+(clientName.split(' ')[0]||'клиент')+(num?'_'+num.replace(/[^a-zA-Zа-яА-Я0-9]/g,'_'):'')+'.docx';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(out);
    a.download=fname;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    toast('✅ Договор скачан: '+fname,'s');
    const sharedData={'ФИО_клиента':clientName||'—','Дата_договора':document.getElementById('contract_date').value,'Инициалы_Фамилия':document.getElementById('initials').value||'—','Паспорт':document.getElementById('passport').value||'—'};
    if(document.getElementById('spec_download').checked){await generateSpec(sharedData);toast('✅ Спецификация скачана','s');}
  }catch(e){
    // Детальный вывод XTTemplateError
    if(e.properties&&e.properties.errors){
      const details=e.properties.errors.map(er=>er.properties&&er.properties.tag?'тег: '+er.properties.tag:'').join(', ');
      console.error('XTTemplateError details:',e.properties.errors);
      toast('Ошибка шаблона. Консоль: неизвестные теги: '+details,'e');
    }else{
      console.error(e);
      toast('Ошибка: '+e.message,'e');
    }
  }
  btn.disabled=false;
  btn.innerHTML='<svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2v9M4 7l4 4 4-4M2 14h12"/></svg> Сгенерировать и скачать договор';
}

// ── СПЕЦИФИКАЦИЯ ────────────────────────────────
document.getElementById('spec_details').addEventListener('toggle', function(){
  document.getElementById('spec_arrow').textContent = this.open ? '▼' : '▶';
});

// Слоты картинок
const imgData = Array(10).fill(null);
const slotsEl = document.getElementById('img_slots');
for(let i=0;i<10;i++){
  const slot = document.createElement('div');
  slot.style.cssText='aspect-ratio:1;border:1px dashed var(--border2);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--surface2);position:relative;overflow:hidden;font-size:11px;color:var(--text3);gap:4px';
  slot.innerHTML='<span style="font-size:18px">📷</span><span>'+(i+1)+'</span>';
  slot.onclick=()=>document.getElementById('img_inp_'+i).click();
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.id='img_inp_'+i;inp.style.display='none';
  inp.onchange=function(e){
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=function(ev){
      imgData[i]={data:ev.target.result,mime:f.type,name:f.name};
      slot.innerHTML='';
      const img=document.createElement('img');
      img.src=ev.target.result;
      img.style.cssText='width:100%;height:100%;object-fit:cover';
      const rm=document.createElement('div');
      rm.innerHTML='✕';
      rm.style.cssText='position:absolute;top:2px;right:4px;font-size:11px;cursor:pointer;color:var(--red-text);font-weight:700';
      rm.onclick=function(ev){ev.stopPropagation();imgData[i]=null;slot.innerHTML='<span style="font-size:18px">📷</span><span>'+(i+1)+'</span>';};
      slot.appendChild(img);slot.appendChild(rm);
    };
    r.readAsDataURL(f);
  };
  slot.appendChild(inp);
  slotsEl.appendChild(slot);
}

function calcSpec(){
  const amt=parseFloat(document.getElementById('spec_amount').value)||0;
  const pct=parseFloat(document.getElementById('spec_assembly_pct').value)||0;
  const total=amt;
  const asmSum=Math.round(total*pct/100*100)/100;
  document.getElementById('spec_total').value=total?total.toLocaleString('ru-RU')+' руб.':'';
  document.getElementById('spec_assembly_sum').value=asmSum?asmSum.toLocaleString('ru-RU')+' руб.':'';
}

async function generateSpec(sharedData){
  const binary=atob(SPEC_B64);
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  const zip=new PizZip(bytes.buffer);
  const doc2=new window.docxtemplater(zip,{delimiters:{start:'{{',end:'}}'},paragraphLoop:true,nullGetter:function(){return '--';}});
  const amt=parseFloat(document.getElementById('spec_amount').value)||0;
  const pct=parseFloat(document.getElementById('spec_assembly_pct').value)||0;
  doc2.render({
    ...sharedData,
    'единица товара': document.getElementById('spec_unit').value||'шт',
    'Сумма спец': amt?amt.toLocaleString('ru-RU')+' руб.':'—',
    'Процент сборки': pct?pct+'%':'—',
    'Общая сумма спец': document.getElementById('spec_total').value||'—',
    'Процент от общей суммы спец': document.getElementById('spec_assembly_sum').value||'—',
  });
  const out=doc2.getZip().generate({type:'blob',mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(out);
  a.download='Спецификация_'+( sharedData['ФИО_клиента'].split(' ')[0]||'клиент')+'.docx';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
}

</script>
