<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заполнение договора — Mebel Grand</title>
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
<script src="https://unpkg.com/docxtemplater@3.48.0/build/docxtemplater.js"></script>
<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#1a1a18;--text2:#6b6b67;--text3:#a8a8a4;
  --blue:#2355f5;--blue-bg:#eef1fe;--blue-text:#1a3db8;
  --green:#1a9e6e;--green-bg:#e4f5ef;--green-text:#0f6847;
  --amber:#d97706;--amber-bg:#fef3e2;--amber-text:#92520a;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#991b1b;
  --purple:#7c3aed;--purple-bg:#f0effe;--purple-text:#4338ca;
  --gold:#b45309;--gold-bg:#fef9c3;
  --tg:#0088cc;--tg-bg:#e8f4fa;
  --r:10px;--rl:14px;--font:'Golos Text',sans-serif;--mono:'JetBrains Mono',monospace;
  --sw:215px;--th:52px;
}
[data-theme=dark]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#242422;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0efe9;--text2:#8f8f8a;--text3:#5a5a56;
  --blue:#4f78ff;--blue-bg:#1a2040;--blue-text:#93aaff;
  --green-bg:#0f2a1f;--green-text:#4fd4a0;
  --amber-bg:#2a1f0a;--amber-text:#fbbf65;
  --red-bg:#2a1010;--red-text:#f87171;
  --purple-bg:#1e1a40;--purple-text:#a5b4fc;
  --gold:#d97706;--gold-bg:#2a1f0a;
  --tg-bg:#0a1f2a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.topbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px}
.logo .lm{width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo .lm svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
.logo .lt{font-size:15px;font-weight:600;letter-spacing:-.02em}.logo .lt span{color:var(--blue)}
.theme-btn{margin-left:auto;width:32px;height:32px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text2)}
.theme-btn:hover{background:var(--border);color:var(--text)}
.card{max-width:520px;margin:24px auto;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl)}
.sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:16px;margin-bottom:8px}
.sec:first-child{margin-top:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{margin-top:12px}
.lbl{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:4px;letter-spacing:.02em;text-transform:uppercase}
.inp{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
.inp:focus{border-color:var(--blue)}
.inp:read-only{opacity:0.7;cursor:not-allowed}
.full{grid-column:1/-1}
.btn-gen{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:16px}
.btn-gen:hover{background:#1a44dd}
.tpl-box{background:var(--surface2);border:1px dashed var(--border2);border-radius:8px;padding:12px;margin-top:12px}
.tpl-box .note{font-size:12px;color:var(--text2);margin-bottom:8px}
.tpl-box .file-info{display:flex;align-items:center;gap:8px;margin-top:8px}
.tpl-box .file-name{font-size:12px;color:var(--text);flex:1}
.tpl-box .reset-btn{padding:4px 10px;background:none;border:1px solid var(--red-text);border-radius:6px;font-size:11px;color:var(--red-text);cursor:pointer}
.tpl-box .reset-btn:hover{background:var(--red-bg)}
.tco{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.to{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:500;animation:tin .2s ease}
.to.s{border-left:3px solid var(--green)}.to.e{border-left:3px solid var(--red)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="topbar">
<div class="logo"><div class="lm"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><path d="M9 12h6M12 9v6"/></svg></div><div class="lt">Мебель<span>Гранд</span></div><button class="theme-btn" onclick="toggleTheme()">◑</button></div>
</div>
<div class="card">
<div class="sec">Договор</div>
<div class="grid">
<div class="fg"><label class="lbl">Номер договора</label><input class="inp" id="contract_number" placeholder="№"></div>
<div class="fg"><label class="lbl">Дата</label><input class="inp" id="contract_date" readonly></div>
</div>

<div class="sec">Клиент</div>
<div class="fg full"><label class="lbl">ФИО клиента</label><input class="inp" id="client_name" placeholder="Иванов Иван Петрович"></div>
<div class="grid">
<div class="fg"><label class="lbl">Паспорт</label><input class="inp" id="passport" placeholder="Серия, номер"></div>
<div class="fg"><label class="lbl">Телефон</label><input class="inp" id="phone" placeholder="+7 ___ ___ __-__"></div>
</div>
<div class="fg full"><label class="lbl">Адрес регистрации</label><input class="inp" id="registration" placeholder="г. Москва, ул. 示例, д. 1"></div>
<div class="fg full"><label class="lbl">Адрес доставки</label><input class="inp" id="delivery" placeholder="г. Москва, ул. 示例, д. 1"></div>
<div class="fg full"><label class="lbl">Email</label><input class="inp" id="email" type="email" placeholder="mail@example.com"></div>
</div>

<div class="sec">Финансы</div>
<div class="grid">
<div class="fg"><label class="lbl">Сумма (₽)</label><input class="inp" id="amount" type="number" placeholder="0"></div>
<div class="fg"><label class="lbl">Сумма прописью</label><input class="inp" id="amount_words" readonly></div>
</div>
<div class="grid">
<div class="fg"><label class="lbl">Предоплата (₽)</label><input class="inp" id="prepayment" type="number" placeholder="0"></div>
<div class="fg"><label class="lbl">Предоплата прописью</label><input class="inp" id="prepayment_words" readonly></div>
</div>

<div class="sec">Подпись</div>
<div class="fg full"><label class="lbl">Инициалы</label><input class="inp" id="initials" readonly></div>

<div class="sec">Шаблон</div>
<div class="tpl-box">
<div class="note">По умолчанию �� встроенный договор Mebel Grand СПБ</div>
<input type="file" id="template_file" accept=".docx">
<div class="file-info" id="file_info" style="display:none"><span class="file-name" id="file_name"></span><button class="reset-btn" onclick="resetTemplate()">Сбросить</button></div>
</div>

<button class="btn-gen" onclick="generateContract()">Сгенерировать и скачать</button>
</div>
<div class="tco" id="tco"></div>

let customTemplate = null;

function toggleTheme() {
  const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('contract_theme', t);
}

document.body.setAttribute('data-theme', localStorage.getItem('contract_theme') || 'light');

const ones = ['','один','два','три','четыре','пять','шесть','семь','восемь','девять'];
const onesF = ['','одна','две','три','четыре','пять','шесть','семь','восемь','девять'];
const teens = ['десять','одиннадцать','двенадцать','тринадцать','четырнадцать','пятнадцать','шестнадцать','семнадцать','十八ять','девятнадцать'];
const tens = ['','','двадцать','тридцать','сорок','пятьдесят','шестьдесят','семьдесят','восемьдесят','девяносто'];
const hundreds = ['','сто','двести','триста','четыреста','пятьсот','шестьсот','семьсот','восемьсот','девятьсот'];

function numberToWords(n) {
  if (n === 0) return 'ноль';
  if (n < 0 || n > 999999999) return '';
  let res = '';
  const millions = Math.floor(n / 1000000);
  const thousands = Math.floor((n % 1000000) / 1000);
  const onesNum = n % 1000;
  if (millions > 0) {
    res += onesF[millions % 10] || (millions > 10 && millions % 10 < 20 ? teens[millions % 10] : tens[Math.floor(millions / 10)] + (millions % 10 ? ' ' + onesF[millions % 10] : ''));
    const m = millions === 1 ? 'миллион' : millions === 2 || millions === 3 || millions === 4 ? 'миллиона' : 'миллионов';
    res += ' ' + m + ' ';
  }
  if (thousands > 0) {
    res += onesF[thousands % 10] || (thousands > 10 && thousands % 10 < 20 ? teens[thousands % 10] : tens[Math.floor(thousands / 10)] + (thousands % 10 ? ' ' + onesF[thousands % 10] : ''));
    const t = thousands === 1 ? 'тысяча' : thousands === 2 || thousands === 3 || thousands === 4 ? 'тысячи' : 'тысяч';
    res += ' ' + t + ' ';
  }
  if (onesNum > 0) {
    res += hundreds[Math.floor(onesNum / 100)] + (onesNum % 100 >= 100 ? ' ' : '');
    const num10 = onesNum % 100;
    if (num10 >= 10 && num10 < 20) {
      res += teens[num10 - 10];
    } else {
      res += tens[Math.floor(num10 / 10)] + (num10 % 10 ? ' ' + ones[num10 % 10] : '');
    }
  }
  return res.trim().replace(/\s+/g, ' ');
}

function getInitials(fullName) {
  const parts = fullName.trim().split(/\s+/);
  if (parts.length < 2) return fullName;
  const surname = parts[0];
  const initials = parts.slice(1).map(p => p[0].toUpperCase() + '.').join('');
  return initials + ' ' + surname;
}

function formatDate() {
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d = new Date();
  const day = String(d.getDate()).padStart(2,'0');
  return '«' + day + '» ' + months[d.getMonth()] + ' ' + d.getFullYear() + ' г.';
}

function toast(msg, t='s') {
  const el = document.createElement('div');
  el.className = 'to ' + t;
  el.textContent = msg;
  document.getElementById('tco').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

document.getElementById('contract_date').value = formatDate();

document.getElementById('client_name').addEventListener('input', function() {
  document.getElementById('initials').value = getInitials(this.value);
});

document.getElementById('amount').addEventListener('input', function() {
  const n = parseInt(this.value) || 0;
  document.getElementById('amount_words').value = numberToWords(n) + ' рублей';
});

document.getElementById('prepayment').addEventListener('input', function() {
  const n = parseInt(this.value) || 0;
  document.getElementById('prepayment_words').value = numberToWords(n) + ' рублей';
});

const fileInput = document.getElementById('template_file');
fileInput.addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    customTemplate = ev.target.result;
    document.getElementById('file_name').textContent = file.name;
    document.getElementById('file_info').style.display = 'flex';
  };
  reader.readAsArrayBuffer(file);
});

function resetTemplate() {
  customTemplate = null;
  fileInput.value = '';
  document.getElementById('file_info').style.display = 'none';
}

function generateContract() {
  try {
    let zipData;
    if (customTemplate) {
      zipData = new PizZip(customTemplate);
    } else {
      zipData = new PizZip(atob(DEFAULT_TEMPLATE_B64));
    }
    const doc = new window.docxtemplater(zipData, {
      paragraphLoop: true,
      linebreaks: true
    });
    const data = {
      'Номер_договора': document.getElementById('contract_number').value,
      'Дата_договора': document.getElementById('contract_date').value,
      'ФИО_клиента': document.getElementById('client_name').value,
      'Сумма_цифрами': document.getElementById('amount').value,
      'Сумма_прописью': document.getElementById('amount_words').value,
      'Предоплата_цифрами': document.getElementById('prepayment').value,
      'Предоплата_прописью': document.getElementById('prepayment_words').value,
      'Паспорт': document.getElementById('passport').value,
      'Адрес_регистрации': document.getElementById('registration').value,
      'Адрес_доставки': document.getElementById('delivery').value,
      'Телефон': document.getElementById('phone').value,
      'Email': document.getElementById('email').value,
      'Инициалы_Фамилия': document.getElementById('initials').value
    };
    doc.render(data);
    const out = doc.getZip().generate({
      type: 'blob',
      mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
    });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(out);
    const name = document.getElementById('client_name').value || 'клиент';
    a.download = 'Договор_' + name + '.docx';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('Договор сгенерирован!', 's');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'e');
  }
}
</script>
