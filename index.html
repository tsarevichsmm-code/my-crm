<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МиниCRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f3f0;--surface:#fff;--surface2:#f9f8f6;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.14);
  --text:#1a1a18;--text2:#6b6b67;--text3:#a8a8a4;
  --blue:#2355f5;--blue-bg:#eef1fe;--blue-text:#1a3db8;
  --green:#1a9e6e;--green-bg:#e4f5ef;--green-text:#0f6847;
  --amber:#d97706;--amber-bg:#fef3e2;--amber-text:#92520a;
  --red:#dc2626;--red-bg:#fef2f2;--red-text:#991b1b;
  --purple-bg:#f0effe;--purple-text:#4338ca;
  --r:10px;--rl:14px;--font:'Golos Text',sans-serif;--mono:'JetBrains Mono',monospace;
  --sw:210px;--th:52px;
}
[data-theme=dark]{
  --bg:#111110;--surface:#1c1c1a;--surface2:#242422;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0efe9;--text2:#8f8f8a;--text3:#5a5a56;
  --blue:#4f78ff;--blue-bg:#1a2040;--blue-text:#93aaff;
  --green-bg:#0f2a1f;--green-text:#4fd4a0;
  --amber-bg:#2a1f0a;--amber-text:#fbbf65;
  --red-bg:#2a1010;--red-text:#f87171;
  --purple-bg:#1e1a40;--purple-text:#a5b4fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}
/* LOGIN */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:32px 28px;width:340px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.lmark{width:34px;height:34px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center}
.lmark svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2}
.ltext{font-size:18px;font-weight:600;letter-spacing:-.02em}.ltext span{color:var(--blue)}
.login-err{font-size:12px;color:var(--red-text);background:var(--red-bg);border-radius:7px;padding:8px 11px;margin-bottom:12px;display:none}
.lfg{margin-bottom:14px}.lfg label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.lfg input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
.lfg input:focus{border-color:var(--blue)}
.login-btn{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer}
.login-btn:hover{background:#1a44dd}
/* SIDEBAR */
.sidebar{width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.slogo{padding:16px 14px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.slogo .lm{width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.slogo .lm svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
.slogo .lt{font-size:15px;font-weight:600;letter-spacing:-.02em}.slogo .lt span{color:var(--blue)}
.snav{padding:10px 8px;flex:1;overflow-y:auto}
.nsec{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:2px;border:1px solid transparent}
.ni:hover{background:var(--surface2);color:var(--text)}
.ni.active{background:var(--blue-bg);color:var(--blue-text);border-color:rgba(35,85,245,.12)}
.ni svg{width:15px;height:15px;flex-shrink:0}
.nbadge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;font-family:var(--mono)}
.sfooter{padding:10px 8px;border-top:1px solid var(--border)}
.urow{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px}
.av{border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--blue-text);flex-shrink:0;font-family:var(--mono)}
.uinfo{flex:1;min-width:0}.uname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.urole{font-size:10px;color:var(--text3)}
.ibtn{width:26px;height:26px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:13px;flex-shrink:0}
.ibtn:hover{background:var(--border);color:var(--text)}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.sw{flex:1;max-width:360px;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:1.8;pointer-events:none}
.sw input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.sw input:focus{border-color:var(--blue)}
.sw input::placeholder{color:var(--text3)}
.tra{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:7px 15px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-p{background:var(--blue);color:#fff;border-color:var(--blue)}.btn-p:hover{background:#1a44dd;border-color:#1a44dd}
.btn-s{padding:5px 11px;font-size:12px;border-radius:7px}
.btn-d{color:var(--red-text);border-color:var(--red-text)}.btn-d:hover{background:var(--red-bg)}
.content{flex:1;overflow-y:auto;padding:20px}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.sl{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.sv{font-size:22px;font-weight:600;letter-spacing:-.03em;font-family:var(--mono)}
/* KANBAN */
.kw{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;align-items:flex-start;min-height:400px}
.kol{width:224px;min-width:224px;flex-shrink:0;display:flex;flex-direction:column}
.kh{padding:9px 12px;border-radius:var(--r) var(--r) 0 0;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.kb{background:var(--surface2);border-radius:0 0 var(--r) var(--r);padding:8px;min-height:80px;border:1px solid var(--border);border-top:none;transition:background .15s}
.kb.dov{background:var(--blue-bg);outline:2px dashed var(--blue);outline-offset:-3px}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px;margin-bottom:8px;cursor:grab;user-select:none;transition:border-color .15s,opacity .15s;position:relative}
.dc:hover{border-color:var(--border2)}.dc.dragging{opacity:.3;cursor:grabbing}
.dco{cursor:pointer;display:flex;align-items:center;gap:4px;font-size:11px;color:var(--blue-text);margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.dco:hover{opacity:.7}
.dn{font-size:13px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px}
.dct{font-size:11px;color:var(--text2)}
.dam{font-size:13px;color:var(--blue);font-weight:600;margin-top:5px;font-family:var(--mono)}
.df{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em}
.ta{background:var(--blue-bg);color:var(--blue-text)}.tp{background:var(--amber-bg);color:var(--amber-text)}
.dd{font-size:10px;color:var(--text3);font-family:var(--mono)}
.dl{height:2px;background:var(--blue);border-radius:2px;margin-bottom:6px;display:none}
.kadd{text-align:center;padding:8px;cursor:pointer;font-size:12px;color:var(--text3);border-radius:7px;transition:all .12s;border:1px dashed transparent}
.kadd:hover{border-color:var(--border2);color:var(--text2);background:var(--surface)}
.rbadge{position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:var(--amber)}
.rbadge.ov{background:var(--red)}
/* PANEL */
.pov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;display:none}
.pov.open{display:block}
.dpanel{position:fixed;top:0;right:0;width:720px;max-width:100vw;height:100vh;background:var(--surface);border-left:1px solid var(--border2);z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
.dpanel.open{transform:translateX(0)}
.dph{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.dptitle{font-size:16px;font-weight:600;flex:1;letter-spacing:-.02em;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dpb{flex:1;display:flex;overflow:hidden}
.dpi{width:240px;flex-shrink:0;border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.dst{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.dfield{font-size:13px;color:var(--text2);line-height:2}.dfield b{color:var(--text);font-weight:500}
.dpss{width:100%;padding:7px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
.nota{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:12px;font-family:var(--font);resize:none;outline:none;line-height:1.6;min-height:80px}
.nota:focus{border-color:var(--blue)}
.rb{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.rl{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.ri{display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:7px}
.ri.ov{border-color:var(--red-text);background:var(--red-bg)}
.ri.done{opacity:.4;text-decoration:line-through}
.rit{flex:1;min-width:0}.ritm{font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap}
.ri.ov .ritm{color:var(--red-text)}
.ridel{width:18px;height:18px;border:none;background:none;cursor:pointer;color:var(--text3);font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:4px}
.ridel:hover{background:var(--red-bg);color:var(--red-text)}
/* CHAT PANE */
.dpc{flex:1;display:flex;flex-direction:column;min-width:0}
.dpch{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.msg{max-width:76%;padding:9px 13px;font-size:13px;line-height:1.55;word-break:break-word}
.mi{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px;align-self:flex-start}
.mo{background:var(--blue);color:#fff;border-radius:14px 4px 14px 14px;align-self:flex-end}
.mt{font-size:10px;opacity:.5;margin-top:4px;text-align:right;font-family:var(--mono)}
.mau{font-size:10px;color:var(--text3);margin-bottom:3px}
.inr{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--surface);flex-shrink:0}
.inr textarea{flex:1;resize:none;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;min-height:40px;max-height:120px;font-family:var(--font);line-height:1.5}
.inr textarea:focus{border-color:var(--blue)}
/* CHATS PAGE */
.chl{display:flex;height:calc(100vh - var(--th) - 40px);min-height:400px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.chlist{width:270px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto}
.cllh{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
.chi{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
.chi:hover{background:var(--surface2)}.chi.active{background:var(--blue-bg)}
.chrow{display:flex;gap:10px;align-items:flex-start}
.chav{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.chm{flex:1;min-width:0}
.chn{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chp{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cha{font-size:10px;color:var(--text3);margin-top:2px}.cht{font-size:10px;color:var(--text3);font-family:var(--mono)}
.ud{width:8px;height:8px;background:var(--blue);border-radius:50%;margin-top:5px;flex-shrink:0}
.chwin{flex:1;display:flex;flex-direction:column;min-width:0}
.chwh{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.abb{background:var(--blue-bg);border:1px solid rgba(35,85,245,.15);border-radius:var(--r);padding:12px 14px;margin-bottom:14px}
/* CONTACTS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;transition:border-color .12s}
.cc:hover{border-color:var(--border2)}
.cc.ac{display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:150px;border-style:dashed}
.cc.ac:hover{border-color:var(--blue);background:var(--blue-bg)}
.cch{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.cci{font-size:12px;color:var(--text2);line-height:2}
/* SETTINGS */
.ss{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px}
.st{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);letter-spacing:-.01em}
.ir{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.ir:last-child{border-bottom:none}
.ii{width:38px;height:38px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.iin{flex:1}.iit{font-size:13px;font-weight:600}.iid{font-size:11px;color:var(--text2);margin-top:2px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mt2{width:100%;border-collapse:collapse;font-size:13px}
.mt2 th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.mt2 td{padding:9px 10px;border-bottom:1px solid var(--border)}
.mt2 tr:last-child td{border-bottom:none}
.rbg{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ra{background:var(--purple-bg);color:var(--purple-text)}.rm{background:var(--green-bg);color:var(--green-text)}
/* MODAL */
.mo2{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:600;align-items:center;justify-content:center}
.mo2.open{display:flex}
.mbox{background:var(--surface);border-radius:var(--rl);padding:22px;width:360px;border:1px solid var(--border2);max-height:90vh;overflow-y:auto}
.mt3{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-.02em}
.fg{margin-bottom:13px}
.fl{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:var(--font)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.mb{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* TOAST */
.tc{position:fixed;bottom:20px;right:20px;z-index:9998;display:flex;flex-direction:column;gap:8px}
.to{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:500;animation:tin .2s ease;display:flex;align-items:center;gap:8px}
.to.s{border-left:3px solid var(--green)}.to.e{border-left:3px solid var(--red)}.to.w{border-left:3px solid var(--amber)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* DASH */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.dcardt{font-size:13px;font-weight:600;margin-bottom:12px;letter-spacing:-.01em}
.dr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.dr:last-child{border-bottom:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>

<div class="login-screen" id="ls">
  <div class="login-box">
    <div class="login-logo">
      <div class="lmark"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><path d="M9 12h6M12 9v6"/></svg></div>
      <div class="ltext">Мини<span>CRM</span></div>
    </div>
    <div style="font-size:15px;font-weight:600;margin-bottom:4px">Добро пожаловать</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:20px">Войдите в свой аккаунт</div>
    <div class="login-err" id="lerr">Неверный логин или пароль</div>
    <div class="lfg"><label>Логин</label><input id="ll" placeholder="admin" autocomplete="username"></div>
    <div class="lfg"><label>Пароль</label><input id="lp" type="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="login-btn" onclick="doLogin()">Войти</button>
    <div style="font-size:11px;color:var(--text3);margin-top:14px;text-align:center">admin / admin123 &nbsp;·&nbsp; manager / manager123</div>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <div class="sidebar">
    <div class="slogo">
      <div class="lm"><svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><path d="M9 12h6M12 9v6"/></svg></div>
      <div class="lt">Мини<span>CRM</span></div>
    </div>
    <nav class="snav">
      <div class="nsec">Основное</div>
      <div class="ni active" data-page="dashboard"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Дашборд</div>

      <div class="tra">

        <button class="btn" onclick="openModal('new-contact')"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="5" r="3"/><path d="M2 14a6 6 0 0112 0"/></svg>Контакт</button>

<script>
const ST={get(k,d){try{const v=localStorage.getItem('crm_'+k);return v?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem('crm_'+k,JSON.stringify(v))}catch{}}};

const DM=[
  {id:1,login:'admin',password:'admin123',name:'Александр И.',role:'admin'},
  {id:2,login:'manager',password:'manager123',name:'Мария С.',role:'manager'},
  {id:3,login:'ivan',password:'ivan123',name:'Иван Петров',role:'manager'},
];
const DD=[
  {id:1,name:'Кухня L-образная',contact:'Клиент Соколов',amount:285000,stage:'new',source:'avito',date:'14.04',note:'',reminders:[],messages:[]},
  {id:2,name:'Шкаф-купе 3м',contact:'Дмитрий Попов',amount:95000,stage:'contact',source:'avito',date:'15.04',note:'Спрашивал про ДСП',reminders:[],messages:[{out:false,text:'Какой материал фасадов?',time:'13:04',author:'Дмитрий'},{out:false,text:'Есть ли доставка?',time:'13:05',author:'Дмитрий'}]},
  {id:3,name:'Гардеробная',contact:'Ольга Кузнецова',amount:340000,stage:'measure',source:'phone',date:'13.04',note:'Замер в четверг 10:00',reminders:[{id:1,text:'Позвонить перед замером',datetime:'2026-04-20T09:00',done:false}],messages:[]},
  {id:4,name:'Детская мебель',contact:'Иван Новиков',amount:120000,stage:'proposal',source:'avito',date:'16.04',note:'',reminders:[],messages:[{out:true,text:'Отправил КП на почту',time:'11:00',author:'Менеджер'}]},
  {id:5,name:'Кухня прямая',contact:'Мария Соколова',amount:195000,stage:'won',source:'avito',date:'10.04',note:'',reminders:[],messages:[]},
  {id:6,name:'Прихожая',contact:'Иван Новиков',amount:75000,stage:'won',source:'avito',date:'08.04',note:'',reminders:[],messages:[]},
];
const DC=[
  {id:1,name:'Клиент Соколов',phone:'+7 916 234-56-78',source:'avito',note:''},
  {id:2,name:'Дмитрий Попов',phone:'+7 903 876-54-32',source:'avito',note:''},
  {id:3,name:'Ольга Кузнецова',phone:'+7 926 111-22-33',source:'phone',note:''},
  {id:4,name:'Иван Новиков',phone:'+7 915 999-00-11',source:'avito',note:''},
  {id:5,name:'Мария Соколова',phone:'+7 900 111-22-33',source:'avito',note:''},
];
const DCH=[
  {id:0,name:'Дмитрий Попов',av:'ДП',avBg:'#dbeafe',avTc:'#1e40af',unread:2,time:'13:05',ad:'Шкаф-купе 3м',messages:[{out:false,text:'Какой материал фасадов?',time:'13:04'},{out:false,text:'Есть ли доставка?',time:'13:05'}]},
  {id:1,name:'Иван Новиков',av:'ИН',avBg:'#fef3c7',avTc:'#92400e',unread:0,time:'11:42',ad:'Гардеробная',messages:[{out:true,text:'Готовы выехать на замер. Когда удобно?',time:'11:35'},{out:false,text:'В четверг?',time:'11:40'}]},
];

let S={
  user:ST.get('user',null),
  managers:ST.get('managers',DM),
  deals:ST.get('deals',DD),
  contacts:ST.get('contacts',DC),
  chats:ST.get('chats',DCH),
  ac:ST.get('ac',0),
  page:ST.get('page','dashboard'),
  theme:ST.get('theme','light'),
  ndi:ST.get('ndi',10),
  nci:ST.get('nci',10),
  nmi:ST.get('nmi',10),
  openDeal:null,
};
function save(){['user','managers','deals','contacts','chats','ac','page','theme','ndi','nci','nmi'].forEach(k=>ST.set(k,S[k]));}

const STAGES=[
  {key:'new',label:'Новые',bg:'#dbeafe',tc:'#1e40af'},
  {key:'contact',label:'Контакт',bg:'#fef3c7',tc:'#92400e'},
  {key:'measure',label:'Замер',bg:'#ede9fe',tc:'#3730a3'},
  {key:'proposal',label:'КП',bg:'#fce7f3',tc:'#9d174d'},
  {key:'won',label:'Выиграно',bg:'#dcfce7',tc:'#166534'},
];

// AUTH
function doLogin(){
  const l=document.getElementById('ll').value.trim(),p=document.getElementById('lp').value;
  const m=S.managers.find(m=>m.login===l&&m.password===p);
  if(!m){document.getElementById('lerr').style.display='block';return;}
  document.getElementById('lerr').style.display='none';
  S.user=m;save();showApp();
}
function doLogout(){S.user=null;save();document.getElementById('app').style.display='none';document.getElementById('ls').style.display='flex';}
function showApp(){
  document.getElementById('ls').style.display='none';
  document.getElementById('app').style.display='flex';
  applyTheme();updateSb();render();startChecker();
}
function updateSb(){
  const u=S.user;if(!u)return;
  document.getElementById('sbav').textContent=u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('sbname').textContent=u.name;
  document.getElementById('sbrole').textContent=u.role==='admin'?'Администратор':'Менеджер';
  document.getElementById('nav-s').style.display=u.role==='admin'?'':'none';
}
function isAdmin(){return S.user?.role==='admin';}

// THEME
function applyTheme(){document.body.setAttribute('data-theme',S.theme);}
function toggleTheme(){S.theme=S.theme==='light'?'dark':'light';applyTheme();save();}

// NAV
document.querySelectorAll('.ni').forEach(el=>el.addEventListener('click',()=>nav(el.dataset.page)));
function nav(p){
  if(p==='settings'&&!isAdmin()){toast('Нет доступа','e');return;}
  S.page=p;document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  const el=document.querySelector(`.ni[data-page="${p}"]`);if(el)el.classList.add('active');
  render();save();
}

// HELPERS
function fmt(n){return Number(n).toLocaleString('ru-RU')+' ₽';}
function today(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');}
function nowt(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fdt(dt){if(!dt)return '';const d=new Date(dt);return d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function isOv(dt){return dt&&new Date(dt)<new Date();}
function toast(msg,t='s'){const el=document.createElement('div');el.className='to '+t;el.textContent=msg;document.getElementById('tc').appendChild(el);setTimeout(()=>el.remove(),3000);}
function ubadge(){const u=S.chats.reduce((s,c)=>s+c.unread,0);const b=document.getElementById('cbadge');if(b){b.textContent=u;b.style.display=u?'':'none';}}

// REMINDER CHECKER
let _ci=null;
function startChecker(){if(_ci)clearInterval(_ci);_ci=setInterval(checkR,30000);checkR();}
function checkR(){
  const now=new Date();
  S.deals.forEach(d=>(d.reminders||[]).forEach(r=>{
    if(r.done||r._n)return;
    if(new Date(r.datetime)<=now){
      r._n=true;
      toast('⏰ '+d.name+': '+r.text,'w');
      if(Notification.permission==='granted')new Notification('МиниCRM',{body:d.name+': '+r.text});
      try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=0.25;o.start();setTimeout(()=>{g.gain.linearRampToValueAtTime(0,ctx.currentTime+0.35);setTimeout(()=>ctx.close(),500);},80);}catch{}
      save();
    }
  }));
}
function askNotif(){if('Notification'in window&&Notification.permission==='default')Notification.requestPermission();}

// RENDER
function render(){
  ubadge();
  const el=document.querySelector(`.ni[data-page="${S.page}"]`);
  if(el){document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));el.classList.add('active');}
  const c=document.getElementById('content');
  if(S.page==='dashboard')c.innerHTML=rDash();
  else if(S.page==='deals'){c.innerHTML=rDeals();initDrag();}
  else if(S.page==='chats')c.innerHTML=rChats();
  else if(S.page==='contacts')c.innerHTML=rContacts();
  else if(S.page==='settings')c.innerHTML=rSettings();
}

function rDash(){
  const tot=S.deals.reduce((s,d)=>s+d.amount,0);
  const won=S.deals.filter(d=>d.stage==='won').reduce((s,d)=>s+d.amount,0);
  const op=S.deals.filter(d=>d.stage!=='won').length;
  const un=S.chats.reduce((s,c)=>s+c.unread,0);
  const upco=[];
  S.deals.forEach(d=>(d.reminders||[]).forEach(r=>{if(!r.done)upco.push({...r,dn:d.name,did:d.id});}));
  upco.sort((a,b)=>new Date(a.datetime)-new Date(b.datetime));
  return`<div class="sg">
    <div class="sc"><div class="sl">Воронка</div><div class="sv">${fmt(tot)}</div><div style="font-size:11px;color:var(--text2);margin-top:5px">${S.deals.length} сделок</div></div>
    <div class="sc"><div class="sl">Выиграно</div><div class="sv" style="color:var(--green)">${fmt(won)}</div><div style="font-size:11px;color:var(--green-text);margin-top:5px">закрытых: ${S.deals.filter(d=>d.stage==='won').length}</div></div>
    <div class="sc"><div class="sl">В работе</div><div class="sv">${op}</div><div style="font-size:11px;color:var(--text2);margin-top:5px">открытых</div></div>
    <div class="sc"><div class="sl">Сообщений</div><div class="sv" style="color:${un?'var(--red)':'var(--text)'}">${un}</div><div style="font-size:11px;color:var(--text2);margin-top:5px">непрочитанных</div></div>
  </div>
  <div class="dg">
    <div class="dcard"><div class="dcardt">Последние сделки</div>
      ${S.deals.slice(-5).reverse().map(d=>`<div class="dr" style="cursor:pointer" onclick="openDeal(${d.id})">
        <div><div style="font-size:13px;font-weight:500">${esc(d.name)}</div><div style="font-size:11px;color:var(--text2)">${esc(d.contact)}</div></div>
        <div style="text-align:right"><div style="font-size:13px;font-weight:600;color:var(--blue);font-family:var(--mono)">${fmt(d.amount)}</div><span class="tag ${d.source==='avito'?'ta':'tp'}">${d.source==='avito'?'Авито':'Тел.'}</span></div>
      </div>`).join('')}
    </div>
    <div class="dcard"><div class="dcardt">Ближайшие будильники</div>
      ${upco.length===0?'<div style="font-size:13px;color:var(--text3);padding:12px 0">Нет запланированных</div>':
        upco.slice(0,6).map(r=>`<div class="dr" style="cursor:pointer" onclick="openDeal(${r.did})">
          <div><div style="font-size:13px;font-weight:500">${esc(r.text)}</div><div style="font-size:11px;color:var(--text2)">${esc(r.dn)}</div></div>
          <div style="font-size:11px;font-family:var(--mono);color:${isOv(r.datetime)?'var(--red-text)':'var(--text3)'}">${fdt(r.datetime)}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

function rDeals(){
  return`<div class="kw" id="kanban">${STAGES.map(s=>{
    const cols=S.deals.filter(d=>d.stage===s.key);
    return`<div class="kol" data-stage="${s.key}">
      <div class="kh" style="background:${s.bg};color:${s.tc}"><span>${s.label}</span><span style="opacity:.65;font-size:11px;font-family:var(--mono)">${cols.length} · ${fmt(cols.reduce((a,d)=>a+d.amount,0))}</span></div>
      <div class="kb" id="kb-${s.key}" ondragover="oCDO(event,'${s.key}')" ondragleave="oCDL(event,'${s.key}')" ondrop="oCDrop(event,'${s.key}')">
        ${cols.map(d=>{
          const hr=(d.reminders||[]).some(r=>!r.done);
          const ov=(d.reminders||[]).some(r=>!r.done&&isOv(r.datetime));
          const mc=(d.messages||[]).length;
          return`<div class="dl" id="dl-${d.id}"></div>
          <div class="dc" id="dc-${d.id}" draggable="true" ondragstart="oDS(event,${d.id})" ondragend="oDE()" ondragover="oCDO2(event,${d.id})">
            ${hr?`<div class="rbadge ${ov?'ov':''}" title="Есть будильник"></div>`:''}
            <div class="dn">${esc(d.name)}</div><div class="dct">${esc(d.contact)}</div>
            <div class="dam">${fmt(d.amount)}</div>
            <div class="df"><span class="tag ${d.source==='avito'?'ta':'tp'}">${d.source==='avito'?'Авито':'Телефон'}</span><span class="dd">${d.date||''}</span></div>
            <div class="dco" onclick="openDeal(${d.id})"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1V8"/><path d="M13 1h2v2M15 1l-7 7"/></svg>Открыть карточку${mc?' · 💬 '+mc:''}</div>
          </div>`;
        }).join('')}
        <div class="dl" id="dl-e-${s.key}"></div>
        <div class="kadd" onclick="openModal('new-deal','${s.key}')">+ добавить</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// DRAG
let drid=null,droc=null,drob=null;
function initDrag(){}
function oDS(e,id){drid=id;setTimeout(()=>{const el=document.getElementById('dc-'+id);if(el)el.classList.add('dragging');},0);e.dataTransfer.effectAllowed='move';}
function oDE(){if(drid){const el=document.getElementById('dc-'+drid);if(el)el.classList.remove('dragging');}clrDr();drid=null;droc=null;drob=null;}
function clrDr(){document.querySelectorAll('.kb').forEach(el=>el.classList.remove('dov'));document.querySelectorAll('.dl').forEach(el=>el.style.display='none');}
function oCDO(e,sk){e.preventDefault();e.dataTransfer.dropEffect='move';if(droc!==sk){clrDr();droc=sk;}document.getElementById('kb-'+sk)?.classList.add('dov');const dl=document.getElementById('dl-e-'+sk);if(dl)dl.style.display='block';drob=null;}
function oCDO2(e,tid){e.preventDefault();e.stopPropagation();if(tid===drid)return;const sk=S.deals.find(d=>d.id===tid)?.stage;if(!sk)return;clrDr();droc=sk;document.getElementById('kb-'+sk)?.classList.add('dov');const dl=document.getElementById('dl-'+tid);if(dl)dl.style.display='block';drob=tid;}
function oCDL(e,sk){const b=document.getElementById('kb-'+sk);if(b&&!b.contains(e.relatedTarget)){b.classList.remove('dov');clrDr();droc=null;drob=null;}}
function oCDrop(e,sk){
  e.preventDefault();if(drid===null)return;
  const d=S.deals.find(d=>d.id===drid);if(!d)return;
  const old=d.stage;S.deals=S.deals.filter(d=>d.id!==drid);
  if(drob!==null){const i=S.deals.findIndex(d=>d.id===drob);d.stage=sk;S.deals.splice(i,0,d);}
  else{d.stage=sk;const l=S.deals.filter(d=>d.stage===sk).slice(-1)[0];if(l){S.deals.splice(S.deals.findIndex(d=>d.id===l.id)+1,0,d);}else{S.deals.push(d);}}
  if(old!==sk)toast('Сделка → "'+STAGES.find(s=>s.key===sk)?.label+'"');
  save();render();
}

// DEAL PANEL
function openDeal(id){
  S.openDeal=id;rPanel();
  document.getElementById('pov').classList.add('open');
  document.getElementById('dpanel').classList.add('open');
  askNotif();
  setTimeout(()=>{const ml=document.getElementById('dpml');if(ml)ml.scrollTop=ml.scrollHeight;},80);
}
function closePanel(){document.getElementById('pov').classList.remove('open');document.getElementById('dpanel').classList.remove('open');S.openDeal=null;}
function rPanel(){

  document.getElementById('dptit').textContent=d.name;
  document.getElementById('dpinfo').innerHTML=`
    <div>
      <div class="dst">Основное</div>
      <div class="dfield"><b>Контакт:</b> ${esc(d.contact)}</div>
      <div class="dfield"><b>Источник:</b> <span class="tag ${d.source==='avito'?'ta':'tp'}">${d.source==='avito'?'Авито':'Телефон'}</span></div>
      <div class="dfield"><b>Сумма:</b> <span style="color:var(--blue);font-family:var(--mono)">${fmt(d.amount)}</span></div>

    </div>

      <div class="dst">Стадия</div>
      <select class="dpss" onchange="chStage(${d.id},this.value)">${STAGES.map(s=>`<option value="${s.key}"${d.stage===s.key?' selected':''}>${s.label}</option>`).join('')}</select>
    </div>
    <div>
      <div class="dst">Примечание</div>
      <textarea class="nota" id="dpnote" placeholder="Заметки по сделке..." oninput="saveNote(${d.id},this.value)">${esc(d.note||'')}</textarea>
    </div>
    <div>
      <div class="rb">
        <div class="dst" style="margin-bottom:0;display:flex;justify-content:space-between;align-items:center">
          <span>Будильники</span>
          <button class="btn btn-s" onclick="openModal('add-rem',${d.id})" style="padding:3px 9px;font-size:11px">+ Добавить</button>
        </div>
        <div class="rl" id="dprl">${rRemList(d)}</div>
      </div>
    </div>
    <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-s" onclick="openModal('edit-deal',${d.id})">✏️ Редактировать</button>
      ${isAdmin()?`<button class="btn btn-s btn-d" onclick="delDeal(${d.id})">🗑 Удалить</button>`:''}
    </div>
  `;
  document.getElementById('dpchat').innerHTML=`
    <div class="dpch"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H3a1 1 0 00-1 1v7a1 1 0 001 1h2l3 3 3-3h2a1 1 0 001-1V3a1 1 0 00-1-1z"/></svg>Переписка — ${(d.messages||[]).length} сообщений</div>

function addDeal(){
  const n=document.getElementById('fdn')?.value?.trim()||'Новая сделка';
  let co=document.getElementById('fdc')?.value;if(co==='__new__')co='Новый клиент';
  const a=parseInt(document.getElementById('fda')?.value)||0;
  const s=document.getElementById('fds')?.value||'new';
  const sr=document.getElementById('fdsr')?.value||'avito';
  S.deals.push({id:S.ndi++,name:n,contact:co,amount:a,stage:s,source:sr,date:today(),note:'',reminders:[],messages:[]});
  save();closeModal();render();toast('Сделка создана');
}
function editDeal(id){
  const d=S.deals.find(d=>d.id===id);if(!d)return;
  d.name=document.getElementById('edn')?.value?.trim()||d.name;
  d.contact=document.getElementById('edc')?.value?.trim()||d.contact;
  d.amount=parseInt(document.getElementById('eda')?.value)||d.amount;
  d.source=document.getElementById('edsr')?.value||d.source;
  save();closeModal();rPanel();render();toast('Обновлено');
}
function addRem(did){
  const d=S.deals.find(d=>d.id===did);if(!d)return;
  const t=document.getElementById('art')?.value?.trim();
  const dt=document.getElementById('ardt')?.value;
  if(!t||!dt){toast('Заполните всё','e');return;}
  if(!d.reminders)d.reminders=[];
  d.reminders.push({id:Date.now(),text:t,datetime:dt,done:false});
  save();closeModal();rPanel();render();toast('Будильник установлен');askNotif();
}
function addC(){
  const n=document.getElementById('fcn')?.value?.trim()||'Контакт';
  const p=document.getElementById('fcp')?.value?.trim()||'—';
  const s=document.getElementById('fcs')?.value||'avito';
  const nt=document.getElementById('fcnt')?.value?.trim()||'';
  S.contacts.push({id:S.nci++,name:n,phone:p,source:s,note:nt});
  save();closeModal();render();toast('Контакт добавлен');
}
function addChat(){
  const n=document.getElementById('fchc')?.value||'Клиент';
  const a=document.getElementById('fcha')?.value||'Объявление';
  const ini=n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const cols=[['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fef3c7','#92400e'],['#ede9fe','#3730a3']];
  const [bg,tc]=cols[S.chats.length%cols.length];
  S.chats.unshift({id:Date.now(),name:n,av:ini,avBg:bg,avTc:tc,unread:0,time:nowt(),ad:a,messages:[]});
  S.ac=0;save();closeModal();render();toast('Чат создан');
}
function addMgr(){
  const n=document.getElementById('nmn')?.value?.trim()||'Менеджер';
  const l=document.getElementById('nml')?.value?.trim();
  const p=document.getElementById('nmp')?.value?.trim();
  const r=document.getElementById('nmr')?.value||'manager';
  if(!l||!p){toast('Заполните логин и пароль','e');return;}
  if(S.managers.find(m=>m.login===l)){toast('Логин занят','e');return;}
  S.managers.push({id:S.nmi++,login:l,password:p,name:n,role:r});
  save();closeModal();render();toast('Менеджер добавлен');
}

  let c=S.chats.find(c=>c.name===name);
  if(!c){const ini=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();c={id:Date.now(),name,av:ini,avBg:'#dbeafe',avTc:'#1e40af',unread:0,time:nowt(),ad:ad||'Авито',messages:[]};S.chats.unshift(c);}
  c.messages.push({out:false,text,time:nowt()});c.unread++;c.time=nowt();
  save();render();toast('Новое сообщение от '+name);
};

// INIT
applyTheme();
if(S.user){showApp();}else{document.getElementById('ls').style.display='flex';}
</script>
