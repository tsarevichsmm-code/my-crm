<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МиниCRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f3f0;
  --surface: #ffffff;
  --surface2: #f9f8f6;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a18;
  --text2: #6b6b67;
  --text3: #a8a8a4;
  --blue: #2355f5;
  --blue-bg: #eef1fe;
  --blue-text: #1a3db8;
  --green: #1a9e6e;
  --green-bg: #e4f5ef;
  --green-text: #0f6847;
  --amber: #d97706;
  --amber-bg: #fef3e2;
  --amber-text: #92520a;
  --red: #dc2626;
  --red-bg: #fef2f2;
  --red-text: #991b1b;
  --purple-bg: #f0effe;
  --purple-text: #4338ca;
  --radius: 10px;
  --radius-lg: 14px;
  --font: 'Golos Text', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --sidebar-w: 210px;
  --topbar-h: 52px;
}
[data-theme="dark"] {
  --bg: #111110;
  --surface: #1c1c1a;
  --surface2: #242422;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0efe9;
  --text2: #8f8f8a;
  --text3: #5a5a56;
  --blue: #4f78ff;
  --blue-bg: #1a2040;
  --blue-text: #93aaff;
  --green-bg: #0f2a1f;
  --green-text: #4fd4a0;
  --amber-bg: #2a1f0a;
  --amber-text: #fbbf65;
  --red-bg: #2a1010;
  --red-text: #f87171;
  --purple-bg: #1e1a40;
  --purple-text: #a5b4fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.logo{padding:18px 16px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border)}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-.02em}
.logo-text span{color:var(--blue)}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue-text);border-color:rgba(35,85,245,.12)}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.8}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600;font-family:var(--mono)}
.nav-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;padding:12px 10px 4px}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border)}
.user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s}
.user-row:hover{background:var(--surface2)}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--blue-text);flex-shrink:0;font-family:var(--mono)}
.user-name{font-size:12px;font-weight:500;flex:1}
.theme-btn{width:26px;height:26px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:14px;transition:all .12s}
.theme-btn:hover{background:var(--border);color:var(--text)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:1.8;pointer-events:none}
.search-wrap input{width:100%;padding:7px 10px 7px 32px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--text3)}
.topbar-actions{display:flex;gap:8px;margin-left:auto}
.btn{padding:7px 15px;border:1px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1a44dd;border-color:#1a44dd}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:7px}
.content{flex:1;overflow-y:auto;padding:20px}

/* DASHBOARD */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.stat-value{font-size:24px;font-weight:600;letter-spacing:-.03em;font-family:var(--mono)}
.stat-delta{font-size:11px;margin-top:5px;display:flex;align-items:center;gap:4px}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.dash-card-title{font-size:13px;font-weight:600;margin-bottom:12px;letter-spacing:-.01em}
.dash-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.dash-row:last-child{border-bottom:none}

/* KANBAN */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:12px;align-items:flex-start;min-height:400px}
.kol{width:220px;min-width:220px;flex-shrink:0;display:flex;flex-direction:column}
.kol-head{padding:9px 12px;border-radius:var(--radius) var(--radius) 0 0;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:center;letter-spacing:.01em}
.kol-body{background:var(--surface2);border-radius:0 0 var(--radius) var(--radius);padding:8px;min-height:100px;border:1px solid var(--border);border-top:none;transition:background .15s,outline .15s}
.kol-body.drag-over{background:var(--blue-bg);outline:2px dashed var(--blue);outline-offset:-3px}
.deal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px;margin-bottom:8px;cursor:grab;transition:border-color .15s,opacity .15s;user-select:none}
.deal-card:hover{border-color:var(--border2)}
.deal-card.dragging{opacity:.3;cursor:grabbing}
.deal-name{font-size:13px;font-weight:600;margin-bottom:3px;letter-spacing:-.01em}
.deal-contact{font-size:11px;color:var(--text2)}
.deal-amount{font-size:13px;color:var(--blue);font-weight:600;margin-top:6px;font-family:var(--mono)}
.deal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em}
.tag-avito{background:var(--blue-bg);color:var(--blue-text)}
.tag-phone{background:var(--amber-bg);color:var(--amber-text)}
.tag-msg{background:var(--green-bg);color:var(--green-text)}
.deal-date{font-size:10px;color:var(--text3);font-family:var(--mono)}
.kol-add{text-align:center;padding:8px;cursor:pointer;font-size:12px;color:var(--text3);border-radius:7px;transition:all .12s;margin-top:2px;border:1px dashed transparent}
.kol-add:hover{border-color:var(--border2);color:var(--text2);background:var(--surface)}
.drop-line{height:2px;background:var(--blue);border-radius:2px;margin-bottom:6px;display:none}

/* CHATS */
.chat-layout{display:flex;height:calc(100vh - var(--topbar-h) - 40px);min-height:400px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.chat-list{width:270px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto}
.chat-list-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600}
.chat-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s}
.chat-item:hover{background:var(--surface2)}
.chat-item.active{background:var(--blue-bg)}
.ch-row{display:flex;gap:10px;align-items:flex-start}
.ch-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.ch-meta{flex:1;min-width:0}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-preview{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ch-ad{font-size:10px;color:var(--text3);margin-top:2px}
.ch-time{font-size:10px;color:var(--text3);font-family:var(--mono)}
.unread-dot{width:8px;height:8px;background:var(--blue);border-radius:50%;margin-top:5px;flex-shrink:0}
.chat-window{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-whead{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface)}
.chat-whead-info{flex:1;min-width:0}
.chat-whead-name{font-size:14px;font-weight:600}
.chat-whead-sub{font-size:11px;color:var(--text2)}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;background:var(--bg)}
.msg{max-width:74%;padding:9px 13px;font-size:13px;line-height:1.55;word-break:break-word}
.msg-in{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px;align-self:flex-start}
.msg-out{background:var(--blue);color:#fff;border-radius:14px 4px 14px 14px;align-self:flex-end}
.msg-time{font-size:10px;opacity:.5;margin-top:4px;text-align:right;font-family:var(--mono)}
.msg-input-row{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;background:var(--surface)}
.msg-input-row textarea{flex:1;resize:none;border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--surface2);color:var(--text);outline:none;min-height:40px;max-height:120px;font-family:var(--font);line-height:1.5;transition:border-color .15s}
.msg-input-row textarea:focus{border-color:var(--blue)}
.avito-banner{background:var(--blue-bg);border:1px solid rgba(35,85,245,.15);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}

/* CONTACTS */
.contacts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:border-color .12s}
.contact-card:hover{border-color:var(--border2)}
.contact-card.add-card{display:flex;align-items:center;justify-content:center;cursor:pointer;min-height:150px;border-style:dashed}
.contact-card.add-card:hover{border-color:var(--blue);background:var(--blue-bg)}
.cc-header{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.cc-info{font-size:12px;color:var(--text2);line-height:2}
.cc-actions{display:flex;gap:6px;margin-top:12px}

/* SETTINGS */
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.settings-title{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);letter-spacing:-.01em}
.int-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.int-row:last-child{border-bottom:none}
.int-icon{width:38px;height:38px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.int-info{flex:1}
.int-name{font-size:13px;font-weight:600}
.int-desc{font-size:11px;color:var(--text2);margin-top:2px}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.code-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;font-family:var(--mono);font-size:12px;color:var(--text2);margin-top:8px;line-height:1.8;overflow-x:auto}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:22px;width:360px;border:1px solid var(--border2);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-.02em}
.form-group{margin-bottom:13px}
.form-label{font-size:11px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:var(--font);transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 16px;font-size:13px;font-weight:500;box-shadow:0 4px 24px rgba(0,0,0,.12);animation:toastIn .2s ease;display:flex;align-items:center;gap:8px}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY STATE */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state svg{width:40px;height:40px;margin:0 auto 12px;display:block;stroke:var(--text3);fill:none;stroke-width:1.2}
.empty-state p{font-size:13px}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><path d="M9 12h6M12 9v6"/></svg>
      </div>
      <div class="logo-text">Мини<span>CRM</span></div>
    </div>
    <nav class="nav">
      <div class="nav-section">Основное</div>
      <div class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>

      </div>

      </div>
      <div class="nav-item" data-page="chats">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H3a1 1 0 00-1 1v7a1 1 0 001 1h2l3 3 3-3h2a1 1 0 001-1V3a1 1 0 00-1-1z"/></svg>

      </div>

      <div class="nav-item" data-page="settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
        Настройки
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-row">
        <div class="avatar" id="user-avatar">АИ</div>
        <div class="user-name" id="user-name-display">Александр И.</div>
        <button class="theme-btn" onclick="toggleTheme()" title="Сменить тему">◑</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3"/></svg>
        <input id="search-input" placeholder="Поиск сделок, контактов..." oninput="handleSearch(this.value)">
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openModal('new-deal')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 2v12M2 8h12"/></svg>
          Сделка
        </button>
        <button class="btn" onclick="openModal('new-contact')">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="5" r="3"/><path d="M2 14a6 6 0 0112 0"/></svg>
          Контакт
        </button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
const STORE = {
  get(key, def) {
    try { const v = localStorage.getItem('crm_' + key); return v ? JSON.parse(v) : def; } catch { return def; }
  },
  set(key, val) {
    try { localStorage.setItem('crm_' + key, JSON.stringify(val)); } catch {}
  }
};

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════

  {id:5, name:'Кухня прямая',       contact:'Мария Соколова',  amount:195000, stage:'won',      source:'avito', date:'10.04'},
  {id:6, name:'Прихожая',           contact:'Иван Новиков',    amount:75000,  stage:'won',      source:'avito', date:'08.04'},
];
const defaultContacts = [

function fmt(n) { return Number(n).toLocaleString('ru-RU') + ' ₽'; }
function today() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0');
}
function nowTime() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function toast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;

  document.getElementById('toasts').appendChild(t);

// ── DRAG & DROP ─────────────────────────────────
let dragId=null, dragOverCol=null, dropBeforeId=null;

function initDrag(){}

function onDragStart(e,id){
  dragId=id;
  setTimeout(()=>{ const el=document.getElementById('dcard-'+id); if(el) el.classList.add('dragging'); },0);
  e.dataTransfer.effectAllowed='move';
}
function onDragEnd(){
  if(dragId){ const el=document.getElementById('dcard-'+dragId); if(el) el.classList.remove('dragging'); }
  clearDragUI(); dragId=null; dragOverCol=null; dropBeforeId=null;
}
function clearDragUI(){
  document.querySelectorAll('.kol-body').forEach(el=>el.classList.remove('drag-over'));
  document.querySelectorAll('.drop-line').forEach(el=>el.style.display='none');
}
function onColDragOver(e,sk){
  e.preventDefault(); e.dataTransfer.dropEffect='move';
  if(dragOverCol!==sk){ clearDragUI(); dragOverCol=sk; }
  document.getElementById('kbody-'+sk).classList.add('drag-over');
  const dl=document.getElementById('dline-end-'+sk); if(dl) dl.style.display='block';
  dropBeforeId=null;
}
function onCardDragOver(e,tid){
  e.preventDefault(); e.stopPropagation();
  if(tid===dragId) return;
  const sk=S.deals.find(d=>d.id===tid)?.stage; if(!sk) return;
  clearDragUI(); dragOverCol=sk;
  document.getElementById('kbody-'+sk).classList.add('drag-over');
  const dl=document.getElementById('dline-'+tid); if(dl) dl.style.display='block';
  dropBeforeId=tid;
}
function onColDragLeave(e,sk){
  const body=document.getElementById('kbody-'+sk);
  if(body && !body.contains(e.relatedTarget)){ body.classList.remove('drag-over'); clearDragUI(); dragOverCol=null; dropBeforeId=null; }
}
function onColDrop(e,sk){
  e.preventDefault(); if(dragId===null) return;
  const deal=S.deals.find(d=>d.id===dragId); if(!deal) return;
  const oldStage=deal.stage;
  S.deals=S.deals.filter(d=>d.id!==dragId);
  if(dropBeforeId!==null){
    const idx=S.deals.findIndex(d=>d.id===dropBeforeId);
    deal.stage=sk; S.deals.splice(idx,0,deal);
  } else {
    deal.stage=sk;
    const last=S.deals.filter(d=>d.stage===sk).slice(-1)[0];
    if(last){ S.deals.splice(S.deals.findIndex(d=>d.id===last.id)+1,0,deal); } else { S.deals.push(deal); }
  }
  if(oldStage!==sk) toast(`Сделка → "${STAGES.find(s=>s.key===sk)?.label}"`);
  save(); render();
}

      <div class="int-info"><div class="int-name">Telegram</div><div class="int-desc">Через Telegram Bot API</div></div>
      <div class="status-dot" style="background:var(--green)"></div>
      <span style="font-size:12px;color:var(--green-text);font-weight:500">Подключён</span>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">Как подключить Авито</div>
    <div style="font-size:13px;line-height:1.9;color:var(--text2)">
      <b style="color:var(--text)">Способ 1 — Авито Pro API</b><br>
      Нужен партнёрский аккаунт. Endpoint для получения чатов:
    </div>
    <div class="code-block">GET https://api.avito.ru/messenger/v3/accounts/{userId}/chats<br>Authorization: Bearer {access_token}</div>
    <div style="font-size:13px;line-height:1.9;color:var(--text2);margin-top:12px">
      <b style="color:var(--text)">Способ 2 — n8n / Make.com</b><br>
      Настройте триггер на Авито → вебхук → добавьте функцию приёма в эту CRM через <code style="background:var(--surface2);padding:1px 5px;border-radius:4px;font-family:var(--mono)">window.receiveChatMessage()</code>
    </div>
  </div>
  <div class="settings-section">
    <div class="settings-title">Данные</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-sm" onclick="exportData()">Экспорт JSON</button>
      <button class="btn btn-sm" onclick="document.getElementById('import-file').click()">Импорт JSON</button>
      <input id="import-file" type="file" accept=".json" style="display:none" onchange="importData(this)">
      <button class="btn btn-sm" style="color:var(--red);border-color:var(--red)" onclick="resetData()">Сбросить данные</button>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:10px">Все данные хранятся в localStorage вашего браузера</div>
  </div>`;
}

function saveName(){
  const v=document.getElementById('uname-input')?.value?.trim();
  if(v){ S.userName=v; save(); render(); toast('Имя сохранено'); }
}
function exportData(){
  const blob=new Blob([JSON.stringify({deals:S.deals,contacts:S.contacts,chats:S.chats},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='crm-export.json'; a.click();
}
function importData(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(d.deals) S.deals=d.deals;
      if(d.contacts) S.contacts=d.contacts;
      if(d.chats) S.chats=d.chats;
      save(); render(); toast('Данные импортированы');
    } catch{ toast('Ошибка файла','error'); }
  };
  reader.readAsText(file);
}
function resetData(){
  if(!confirm('Удалить все данные? Это действие нельзя отменить.')) return;
  S.deals=[...defaultDeals]; S.contacts=[...defaultContacts]; S.chats=[...defaultChats];
  S.nextDealId=10; S.nextContactId=10;
  save(); render(); toast('Данные сброшены','error');
}

// ═══════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════
function handleSearch(v){
  if(S.page==='contacts') render();
  else if(v && S.page==='deals'){
    const found=S.deals.filter(d=>d.name.toLowerCase().includes(v.toLowerCase())||d.contact.toLowerCase().includes(v.toLowerCase()));
    if(found.length===1){ toast(`Найдено: ${found[0].name}`); }
  }
}

// ═══════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════
function openModal(type, extra){
  const mo=document.getElementById('modal-overlay');
  const m=document.getElementById('modal');
  mo.classList.add('open');

  if(type==='new-deal'||type==='new-deal-contact'){
    const preContact=extra||'';
    const preStage=type==='new-deal'&&extra&&STAGES.find(s=>s.key===extra)?extra:'new';
    m.innerHTML=`
      <div class="modal-title">Новая сделка</div>
      <div class="form-group"><label class="form-label">Название</label><input id="fd-name" placeholder="Кухня, шкаф..."></div>
      <div class="form-group"><label class="form-label">Контакт</label>
        <select id="fd-contact">
          ${S.contacts.map(c=>`<option value="${c.name}" ${c.name===preContact?'selected':''}>${c.name}</option>`).join('')}
          <option value="__new__">+ Новый контакт</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Сумма (₽)</label><input id="fd-amount" type="number" placeholder="150000"></div>
      <div class="form-group"><label class="form-label">Стадия</label>
        <select id="fd-stage">${STAGES.map(s=>`<option value="${s.key}" ${s.key===preStage?'selected':''}>${s.label}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Источник</label>
        <select id="fd-source"><option value="avito">Авито</option><option value="phone">Телефон</option><option value="site">Сайт</option></select>
      </div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" onclick="addDeal()">Создать</button>
      </div>`;
  }
  else if(type==='new-contact'){
    m.innerHTML=`
      <div class="modal-title">Новый контакт</div>
      <div class="form-group"><label class="form-label">Имя</label><input id="fc-name" placeholder="Иван Иванов"></div>
      <div class="form-group"><label class="form-label">Телефон</label><input id="fc-phone" placeholder="+7 900 000-00-00"></div>
      <div class="form-group"><label class="form-label">Источник</label>
        <select id="fc-src"><option value="avito">Авито</option><option value="phone">Телефон</option></select>
      </div>
      <div class="form-group"><label class="form-label">Заметка</label><textarea id="fc-note" rows="2" placeholder="Комментарий..."></textarea></div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" onclick="addContact()">Добавить</button>
      </div>`;
  }
  else if(type==='new-chat'){
    m.innerHTML=`
      <div class="modal-title">Новый чат</div>
      <div class="form-group"><label class="form-label">Контакт</label>
        <select id="fch-contact">${S.contacts.map(c=>`<option value="${c.name}">${c.name}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Объявление/товар</label><input id="fch-ad" placeholder="Кухня, шкаф..."></div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" onclick="addChat()">Создать</button>
      </div>`;
  }
  else if(type==='link-deal'){
    m.innerHTML=`
      <div class="modal-title">Привязать к сделке</div>
      <div class="form-group"><label class="form-label">Сделка</label>
        <select id="fld-deal">${S.deals.map(d=>`<option value="${d.id}">${d.name} — ${d.contact}</option>`).join('')}</select>
      </div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" onclick="closeModal();toast('Чат привязан к сделке')">Привязать</button>
      </div>`;
  }
  else if(type==='avito-setup'){
    m.innerHTML=`
      <div class="modal-title">Подключение Авито Pro API</div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.7">Получить ключи можно в личном кабинете Авито → Для бизнеса → API. Требуется партнёрский аккаунт.</div>
      <div class="form-group"><label class="form-label">Client ID</label><input placeholder="Ваш client_id"></div>
      <div class="form-group"><label class="form-label">Client Secret</label><input type="password" placeholder="Ваш client_secret"></div>
      <div class="form-group"><label class="form-label">User ID (аккаунт Авито)</label><input placeholder="12345678"></div>
      <div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:8px;padding:10px;font-size:12px;color:var(--amber-text);margin-bottom:14px">
        ⚠️ Обычный аккаунт Авито не имеет доступа к Messenger API. Нужен партнёрский статус.
      </div>
      <div class="modal-btns">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn btn-primary" onclick="toast('Настройки сохранены (демо)');closeModal()">Сохранить</button>
      </div>`;
  }
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}

function addDeal(){
  const name=document.getElementById('fd-name')?.value?.trim()||'Новая сделка';
  let contact=document.getElementById('fd-contact')?.value;
  if(contact==='__new__') contact='Новый клиент';
  const amount=parseInt(document.getElementById('fd-amount')?.value)||0;
  const stage=document.getElementById('fd-stage')?.value||'new';
  const source=document.getElementById('fd-source')?.value||'avito';
  S.deals.push({id:S.nextDealId++,name,contact,amount,stage,source,date:today()});
  save(); closeModal(); render(); toast('Сделка создана');
}

function addContact(){
  const name=document.getElementById('fc-name')?.value?.trim()||'Новый контакт';
  const phone=document.getElementById('fc-phone')?.value?.trim()||'—';
  const source=document.getElementById('fc-src')?.value||'avito';
  const note=document.getElementById('fc-note')?.value?.trim()||'';
  S.contacts.push({id:S.nextContactId++,name,phone,source,note});
  save(); closeModal(); render(); toast('Контакт добавлен');
}

function addChat(){
  const name=document.getElementById('fch-contact')?.value||'Клиент';
  const ad=document.getElementById('fch-ad')?.value||'Объявление';
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const colors=[['#dbeafe','#1e40af'],['#dcfce7','#166534'],['#fef3c7','#92400e'],['#ede9fe','#3730a3']];
  const [avBg,avTc]=colors[S.chats.length%colors.length];
  S.chats.unshift({id:Date.now(),name,av:initials,avBg,avTc,unread:0,time:nowTime(),ad,messages:[]});
  S.activeChat=0;
  save(); closeModal(); render(); toast('Чат создан');
}

// ═══════════════════════════════════════════════
// PUBLIC API для вебхука Авито
// ═══════════════════════════════════════════════
window.receiveChatMessage = function(contactName, text, adTitle) {
  let chat = S.chats.find(c=>c.name===contactName);
  if(!chat){
    const initials=contactName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    chat={id:Date.now(),name:contactName,av:initials,avBg:'#dbeafe',avTc:'#1e40af',unread:0,time:nowTime(),ad:adTitle||'Авито',messages:[]};
    S.chats.unshift(chat);
  }
  chat.messages.push({out:false,text,time:nowTime()});
  chat.unread++;
  chat.time=nowTime();
  save(); render();
  toast(`Новое сообщение от ${contactName}`);
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
applyTheme();
render();
</script>
